<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roliga Fotbollsnyheter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1a6b3c;
      --green-light: #e8f5ee;
      --grass: #2d8a52;
      --yellow: #f5c842;
      --dark: #111a14;
      --mid: #3a4a3e;
      --muted: #7a8c7e;
      --paper: #fafaf7;
      --white: #ffffff;
    }

    body {
      background: var(--paper);
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* Header */
    header {
      background: var(--dark);
      padding: 0;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 60px),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 60px);
      pointer-events: none;
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px 40px;
      position: relative;
    }

    .header-tag {
      display: inline-block;
      background: var(--yellow);
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 10vw, 96px);
      color: var(--white);
      line-height: 0.92;
      letter-spacing: 0.01em;
      margin-bottom: 16px;
    }

    h1 span {
      color: var(--yellow);
    }

    .header-sub {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 17px;
      color: rgba(255,255,255,0.55);
      max-width: 480px;
    }

    .updated-bar {
      background: var(--grass);
      padding: 8px 24px;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.06em;
    }

    /* Main content */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e5e2;
    }

    /* Article cards */
    .articles {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .card {
      background: var(--white);
      border: 1px solid #e4ebe6;
      border-radius: 12px;
      padding: 28px 32px;
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 20px;
      align-items: start;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      cursor: default;
      margin-bottom: 12px;
      animation: fadeUp 0.5s ease both;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(26,107,60,0.10);
      border-color: #b8d9c4;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.15s; }
    .card:nth-child(3) { animation-delay: 0.25s; }
    .card:nth-child(4) { animation-delay: 0.35s; }
    .card:nth-child(5) { animation-delay: 0.45s; }

    .card-emoji {
      width: 64px;
      height: 64px;
      background: var(--green-light);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      flex-shrink: 0;
    }

    .card-body {}

    .card-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--grass);
      margin-bottom: 8px;
    }

    .card-headline {
      font-family: 'Lora', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--dark);
      line-height: 1.35;
      margin-bottom: 10px;
    }

    .card-summary {
      font-size: 15px;
      color: var(--mid);
      line-height: 1.65;
    }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 18px;
    }

    /* Error state */
    .error {
      background: #fff3f3;
      border: 1px solid #fcc;
      border-radius: 10px;
      padding: 24px;
      color: #a33;
      text-align: center;
    }

    /* Footer */
    footer {
      border-top: 1px solid #e4ebe6;
      padding: 24px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    footer strong {
      color: var(--green);
    }

    @media (max-width: 540px) {
      .card {
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 20px;
      }
      .card-emoji { width: 48px; height: 48px; font-size: 24px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-tag">⚽ AI-genererat innehåll</div>
    <h1 id="site-title">Roliga<br><span>Fotbolls&shy;nyheter</span></h1>
    <p class="header-sub" id="site-subtitle">Laddar veckans nyheter...</p>
  </div>
</header>

<div class="updated-bar" id="updated-bar">Hämtar senaste innehåll...</div>

<main>
  <div class="section-label">Veckans nyheter</div>
  <div class="articles" id="articles">
    <div class="loading">Laddar nyheter...</div>
  </div>
</main>

<footer>
  Innehållet genereras av <strong>Claude AI</strong> &middot; Uppdateras automatiskt
</footer>

<script>
  async function loadContent() {
    const articlesEl = document.getElementById('articles');
    const subtitleEl = document.getElementById('site-subtitle');
    const updatedEl  = document.getElementById('updated-bar');

    try {
      const res = await fetch('content.json?v=' + Date.now());
      if (!res.ok) throw new Error('Kunde inte hämta innehåll');
      const data = await res.json();

      // Update header
      if (data.subtitle) subtitleEl.textContent = data.subtitle;
      if (data.updated)  updatedEl.textContent  = 'Senast uppdaterad: ' + data.updated;

      // Render articles
      if (!data.articles || data.articles.length === 0) {
        articlesEl.innerHTML = '<div class="loading">Inga nyheter just nu.</div>';
        return;
      }

      articlesEl.innerHTML = data.articles.map((a, i) => `
        <div class="card" style="animation-delay:${i * 0.1 + 0.05}s">
          <div class="card-emoji">${a.emoji || '⚽'}</div>
          <div class="card-body">
            <span class="card-tag">${a.tag || 'Nyhet'}</span>
            <div class="card-headline">${a.headline}</div>
            <div class="card-summary">${a.summary}</div>
          </div>
        </div>
      `).join('');

    } catch (err) {
      articlesEl.innerHTML = `<div class="error">⚠️ ${err.message}</div>`;
    }
  }

  loadContent();
</script>

</body>
</html>
